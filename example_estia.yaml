###############################################################################
# Example ESPHome config for Toshiba Estia heat pump via AB-bus (A0-protocol)
#
# Protocol: Estia A0-protocol at 2400 baud 8E1 (NOT TCC-Link or TU2C)
# Compatible with Toshiba Estia R32 systems. For ESTIA R410A systems, use
# estia_R410A.yaml instead.
###############################################################################

esphome:
  name: toshiba-estia

esp8266:
  board: esp12e

logger:
  baud_rate: 0    # Free hardware UART for AB-protocol
  level: INFO

api:

ota:
  password: "your_ota_password"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Toshiba Estia Fallback"
    password: "your_ap_password"

web_server:
  port: 80

external_components:
  - source:
      type: git
      url: https://github.com/makusets/esphome-toshiba-ab
    refresh: 0s

# AB-Bus UART
uart:
  tx_pin: GPIO15    # Adjust for your board variant
  rx_pin: GPIO13
  baud_rate: 2400
  parity: EVEN
  rx_buffer_size: 2048

climate:
  - platform: toshiba_ab
    name: "Toshiba Estia"
    id: toshiba_estia

    # A0-protocol (used by some Estia/heat pump models, NOT TCC-Link or TU2C)
    frame_format: a0
    filter_frames: false

    # Read-only mode: needs to be set to false to allow sending commands
    read_only: false

    # Autonomous polling: query E8:C0 (temperatures) and E8:C1 (operating hours)
    # without requiring a KNX gateway on the bus
    autonomous: false

    # Diagnostic sensors
    connected:
      name: "Estia Connected"
    failed_crcs:
      name: "Estia Failed CRCs"
    read_only_switch:
      name: "Estia Read Only"

    # Estia-specific sensors
    outdoor_temperature:
      name: "Estia Outdoor Temperature"
    compressor_hours:
      name: "Estia Compressor Hours"
    waterpump_hours:
      name: "Estia Water Pump Hours"
    backup_heater_hours:
      name: "Estia Backup Heater Hours"

    # 0-10V demand sensor (shows current demand value 0..15)
    # demand:
    #   name: "Estia 0-10V Demand"

# Optional: 0-10V demand emulation
# Uncomment the sections below to emulate the physical 0-10V interface
# in software. This sends periodic heartbeats as address 0x0041.
# Also set demand_enabled: true in the climate section above.

# number:
#   - platform: template
#     name: "Estia Demand"
#     id: estia_demand
#     min_value: 0
#     max_value: 15
#     step: 1
#     optimistic: true
#     restore_value: true
#     set_action:
#       - lambda: id(toshiba_estia).send_estia_demand((uint8_t)x);

# Optional: switches for runtime control
switch:
  - platform: template
    name: "Estia Autonomous"
    id: estia_autonomous
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - lambda: id(toshiba_estia).set_autonomous(true);
    turn_off_action:
      - lambda: id(toshiba_estia).set_autonomous(false);
  # - platform: template
  #   name: "Estia Demand Enable"
  #   id: estia_demand_enable
  #   optimistic: true
  #   restore_mode: RESTORE_DEFAULT_OFF
  #   turn_on_action:
  #     - lambda: id(toshiba_estia).set_demand_enabled(true);
  #   turn_off_action:
  #     - lambda: id(toshiba_estia).set_demand_enabled(false);
